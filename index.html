<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ring Puzzle Simulator</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
    padding:20px;
}

h1,h2{
    margin-top:0;
}

.section{
    background:#1c1c1c;
    border:1px solid #333;
    border-radius:12px;
    padding:16px;
    margin-bottom:20px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:4px;
}

.rings{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.ring{
    width:100px;
    height:100px;
    border:6px solid #777;
    border-radius:50%;
    background:#222;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

.large-ring{
    width:150px;
    height:150px;
    border:8px solid gold;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#222;
    margin:auto;
}

.basket-row{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.basket{
    width:110px;
    height:110px;
    border-radius:14px;
    border:3px solid white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.players{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
}

.player{
    background:#2b2b2b;
    border-radius:12px;
    border:2px solid #444;
    padding:14px;
    cursor:pointer;
    transition:0.15s;
}

.player:hover{
    transform:scale(1.02);
}

.selected{
    border:3px solid yellow;
}

.ball{
    width:40px;
    height:28px;
    border-radius:50%;
    border:2px solid black;
    margin-top:8px;
    cursor:grab;
}

.white{
    background:white;
}

.red{
    background:#ff5050;
}

.blue{
    background:#4d7dff;
}

.log{
    background:black;
    padding:12px;
    border-radius:10px;
    max-height:250px;
    overflow:auto;
    font-family:monospace;
}

.revealed{
    color:#00ff88;
    font-size:12px;
    margin-top:6px;
}

</style>
</head>
<body>

<h1>Ring Puzzle Simulator</h1>

<div class="section">

    <button onclick="generatePuzzle()">Generate Puzzle</button>
    <button onclick="restockBaskets()">Restock Baskets</button>
    <button onclick="resetEverything()">Reset Everything</button>

</div>

<div class="section">

    <h2>Large Reveal Ring</h2>

    <div class="large-ring">
        Check Ring Colors
    </div>

</div>

<div class="section">

    <h2>Rings</h2>

    <div class="rings" id="rings"></div>

</div>

<div class="section">

    <h2>Baskets</h2>

    <div class="basket-row" id="baskets"></div>

</div>

<div class="section">

    <h2>Players</h2>

    <div class="players" id="players"></div>

</div>

<div class="section">

    <h2>Log</h2>

    <div class="log" id="log"></div>

</div>

<script>

const COLORS = ["white","red","blue"];

let currentPlayer = 0;

let players = [];

let ringSolution = [];
let ringFilled = [null,null,null,null,null];

let ringRevealed = [false,false,false,false,false];

let baskets = [];

function log(msg){
    const div = document.getElementById("log");
    div.innerHTML = msg + "<br>" + div.innerHTML;
}

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function randomChoice(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generatePuzzle(){

    ringFilled = [null,null,null,null,null];
    ringRevealed = [false,false,false,false,false];

    let colors = [...COLORS];
    shuffle(colors);

    ringSolution = [
        colors[0],
        colors[0],
        colors[1],
        colors[1],
        colors[2]
    ];

    shuffle(ringSolution);

    generateBasketPattern();

    players = [];

    for(let i=0;i<6;i++){
        players.push({
            holding:null
        });
    }

    renderAll();

    log("Generated new puzzle.");
}

function generateBasketPattern(){

    let colors = [...COLORS];
    shuffle(colors);

    baskets = [];

    let pattern = [
        colors[0],
        colors[0],
        colors[0],
        colors[1],
        colors[1]
    ];

    shuffle(pattern);

    pattern.forEach(color=>{
        baskets.push({
            color:color,
            hasBall:true
        });
    });
}

function renderAll(){
    renderPlayers();
    renderBaskets();
    renderRings();
}

function renderPlayers(){

    const div = document.getElementById("players");
    div.innerHTML = "";

    players.forEach((p,index)=>{

        const playerDiv = document.createElement("div");

        playerDiv.className = "player";

        if(index===currentPlayer){
            playerDiv.classList.add("selected");
        }

        playerDiv.onclick = ()=>{
            currentPlayer = index;
            renderPlayers();
        };

        playerDiv.innerHTML = `
            <h3>
                Player ${index+1}
            </h3>

            Holding:
            ${p.holding ? `
                <div 
                    class="ball ${p.holding}" 
                    draggable="true"
                    ondragstart="dragBall(event, ${index})"
                ></div>
            ` : "Nothing"}

            <br>

            <button onclick="checkRingColors(${index})">
                Check Ring Colors
            </button>
        `;

        div.appendChild(playerDiv);
    });
}

function renderBaskets(){

    const div = document.getElementById("baskets");

    div.innerHTML = "";

    baskets.forEach((basket,index)=>{

        const basketDiv = document.createElement("div");

        basketDiv.className = `basket ${basket.color}`;

        basketDiv.innerHTML = `
            Basket ${index+1}
            <br>
            ${basket.color.toUpperCase()}
            ${basket.hasBall ? `
                <div class="ball ${basket.color}"></div>
            ` : ""}
        `;

        basketDiv.onclick = ()=>{
            grabBall(index);
        };

        div.appendChild(basketDiv);
    });
}

function renderRings(){

    const div = document.getElementById("rings");

    div.innerHTML = "";

    for(let i=0;i<5;i++){

        const ring = document.createElement("div");

        ring.className = "ring";

        ring.ondragover = (e)=>{
            e.preventDefault();
        };

        ring.ondrop = (e)=>{
            dropBall(e,i);
        };

        ring.innerHTML = `
            <strong>Ring ${i+1}</strong>

            ${
                ringFilled[i]
                ? `<div class="ball ${ringFilled[i]}"></div>`
                : ""
            }

            ${
                ringRevealed[i]
                ? `<div class="revealed">
                    Needs ${ringSolution[i].toUpperCase()}
                   </div>`
                : ""
            }
        `;

        div.appendChild(ring);
    }
}

function grabBall(index){

    let basket = baskets[index];

    if(!basket.hasBall){
        alert("No ball in basket.");
        return;
    }

    players[currentPlayer].holding = basket.color;

    basket.hasBall = false;

    renderAll();

    log(
        `Player ${currentPlayer+1} grabbed ${basket.color.toUpperCase()}`
    );
}

function checkRingColors(playerIndex){

    let held = players[playerIndex].holding;

    if(!held){
        alert("Player not holding a ball.");
        return;
    }

    players[playerIndex].holding = null;

    for(let i=0;i<5;i++){

        if(ringSolution[i]===held){
            ringRevealed[i] = true;
        }
    }

    let remaining = COLORS.filter(c=>c!==held);

    let pattern = [
        remaining[0],
        remaining[0],
        remaining[0],
        remaining[1],
        remaining[1]
    ];

    shuffle(pattern);

    baskets = [];

    for(let i=0;i<5;i++){

        baskets.push({
            color:pattern[i],
            hasBall:i<4
        });
    }

    renderAll();

    log(
        `Player ${playerIndex+1} checked ${held.toUpperCase()}`
    );
}

function dragBall(event,playerIndex){

    event.dataTransfer.setData("player",playerIndex);
}

function dropBall(event,ringIndex){

    const playerIndex = parseInt(
        event.dataTransfer.getData("player")
    );

    const held = players[playerIndex].holding;

    if(!held){
        return;
    }

    if(!ringRevealed[ringIndex]){
        alert("Ring color has not been revealed yet.");
        return;
    }

    if(ringSolution[ringIndex]!==held){
        alert("Wrong color for this ring.");
        return;
    }

    ringFilled[ringIndex] = held;

    players[playerIndex].holding = null;

    renderAll();

    log(
        `Player ${playerIndex+1} placed ${held.toUpperCase()} into Ring ${ringIndex+1}`
    );
}

function restockBaskets(){

    baskets.forEach(b=>{
        b.hasBall = true;
    });

    renderAll();

    log("Baskets restocked.");
}

function resetEverything(){

    ringSolution = [];
    ringFilled = [null,null,null,null,null];
    ringRevealed = [false,false,false,false,false];
    baskets = [];
    players = [];

    document.getElementById("log").innerHTML = "";

    generatePuzzle();
}

generatePuzzle();

</script>

</body>
</html>
