<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ring Puzzle Simulator</title>

<style>
    body{
        background:#111;
        color:white;
        font-family:Arial, Helvetica, sans-serif;
        margin:0;
        padding:20px;
    }

    h1,h2,h3{
        margin-top:10px;
    }

    .section{
        background:#1c1c1c;
        border:1px solid #333;
        border-radius:12px;
        padding:16px;
        margin-bottom:20px;
    }

    .rings{
        display:flex;
        gap:20px;
        flex-wrap:wrap;
        margin-top:15px;
    }

    .ring{
        width:90px;
        height:90px;
        border:6px solid #777;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:14px;
        text-align:center;
        position:relative;
        background:#222;
    }

    .large-ring{
        width:140px;
        height:140px;
        border:8px solid gold;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        margin-bottom:20px;
        background:#222;
    }

    .basket-row{
        display:flex;
        gap:15px;
        flex-wrap:wrap;
        margin-top:15px;
    }

    .basket{
        width:100px;
        height:100px;
        border-radius:12px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        font-weight:bold;
        color:black;
        border:3px solid white;
    }

    .player-grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:15px;
        margin-top:15px;
    }

    .player{
        background:#2a2a2a;
        border-radius:12px;
        padding:12px;
        border:2px solid #444;
    }

    button{
        padding:8px 12px;
        margin:4px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-weight:bold;
    }

    .white{
        background:white;
        color:black;
    }

    .red{
        background:#ff4b4b;
        color:white;
    }

    .blue{
        background:#4b7bff;
        color:white;
    }

    .gray{
        background:#555;
        color:white;
    }

    .selected{
        outline:4px solid yellow;
    }

    .log{
        max-height:300px;
        overflow:auto;
        background:black;
        padding:10px;
        border-radius:10px;
        font-family:monospace;
    }

</style>
</head>
<body>

<h1>Ring Puzzle Simulator</h1>

<div class="section">
    <h2>Controls</h2>

    <button onclick="generatePuzzle()">Generate New Puzzle</button>
    <button onclick="restockBaskets()">Restock Baskets</button>
    <button onclick="resetAll()">Full Reset</button>

    <br><br>

    Current Selected Player:
    <select id="playerSelect" onchange="setCurrentPlayer()">
        <option value="0">Player 1</option>
        <option value="1">Player 2</option>
        <option value="2">Player 3</option>
        <option value="3">Player 4</option>
        <option value="4">Player 5</option>
        <option value="5">Player 6</option>
    </select>
</div>

<div class="section">
    <h2>Large Reveal Ring</h2>

    <div class="large-ring">
        Reveal Ring
    </div>
</div>

<div class="section">
    <h2>Small Rings</h2>

    <div class="rings" id="rings"></div>
</div>

<div class="section">
    <h2>Baskets</h2>

    <div class="basket-row" id="baskets"></div>
</div>

<div class="section">
    <h2>Players</h2>

    <div class="player-grid" id="players"></div>
</div>

<div class="section">
    <h2>Log</h2>

    <div class="log" id="log"></div>
</div>

<script>

const COLORS = ["white","red","blue"];

let ringSolution = [];
let ringFilled = [null,null,null,null,null];

let baskets = [];
let currentPlayer = 0;

let players = [];

function log(msg){
    const div = document.getElementById("log");
    div.innerHTML = msg + "<br>" + div.innerHTML;
}

function randomChoice(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function generatePuzzle(){

    ringFilled = [null,null,null,null,null];

    // Generate 2/2/1 split
    let colors = [...COLORS];
    shuffle(colors);

    ringSolution = [
        colors[0],
        colors[0],
        colors[1],
        colors[1],
        colors[2]
    ];

    shuffle(ringSolution);

    generateBasketPattern();

    players = [];

    for(let i=0;i<6;i++){
        players.push({
            holding:null,
            pickups:0
        });
    }

    renderAll();

    log("Generated new puzzle.");
}

function generateBasketPattern(){

    let colors = [...COLORS];
    shuffle(colors);

    baskets = [
        colors[0],
        colors[0],
        colors[0],
        colors[1],
        colors[1]
    ];

    shuffle(baskets);
}

function renderAll(){
    renderRings();
    renderBaskets();
    renderPlayers();
}

function renderRings(){

    const div = document.getElementById("rings");
    div.innerHTML = "";

    for(let i=0;i<5;i++){

        const r = document.createElement("div");
        r.className = "ring";

        let fill = ringFilled[i];

        r.innerHTML = `
            <div>
                Ring ${i+1}<br>
                ${fill ? fill.toUpperCase() : "EMPTY"}
            </div>
        `;

        if(fill){
            r.style.background = fill;
            r.style.color = fill==="white" ? "black" : "white";
        }

        div.appendChild(r);
    }
}

function renderBaskets(){

    const div = document.getElementById("baskets");
    div.innerHTML = "";

    baskets.forEach((color,index)=>{

        const b = document.createElement("div");
        b.className = `basket ${color}`;

        b.innerHTML = `
            Basket ${index+1}<br>
            ${color.toUpperCase()}
        `;

        b.onclick = ()=>grabBall(index);

        div.appendChild(b);
    });
}

function renderPlayers(){

    const div = document.getElementById("players");
    div.innerHTML = "";

    players.forEach((p,index)=>{

        const d = document.createElement("div");

        d.className = "player";

        if(index===currentPlayer){
            d.classList.add("selected");
        }

        d.innerHTML = `
            <h3>Player ${index+1}</h3>

            Holding:
            <strong>
                ${p.holding ? p.holding.toUpperCase() : "NOTHING"}
            </strong>

            <br><br>

            Pickups: ${p.pickups}

            <br><br>

            <button onclick="revealBall(${index})">
                Reveal Ball
            </button>

            <button onclick="placeBall(${index})">
                Place Ball
            </button>
        `;

        div.appendChild(d);
    });
}

function setCurrentPlayer(){
    currentPlayer = parseInt(document.getElementById("playerSelect").value);
    renderPlayers();
}

function grabBall(basketIndex){

    const color = baskets[basketIndex];

    players[currentPlayer].holding = color;
    players[currentPlayer].pickups++;

    baskets.splice(basketIndex,1);

    renderAll();

    log(`Player ${currentPlayer+1} grabbed ${color.toUpperCase()}`);
}

function revealBall(playerIndex){

    let held = players[playerIndex].holding;

    if(!held){
        alert("Player holding nothing.");
        return;
    }

    players[playerIndex].holding = null;

    let matches = [];

    for(let i=0;i<5;i++){
        if(ringSolution[i]===held){
            matches.push(i+1);
        }
    }

    // reroll baskets using OTHER TWO COLORS

    let remaining = COLORS.filter(c=>c!==held);

    baskets = [
        remaining[0],
        remaining[0],
        remaining[0],
        remaining[1],
        remaining[1]
    ];

    shuffle(baskets);

    baskets.pop();

    renderAll();

    log(
        `Player ${playerIndex+1} revealed ${held.toUpperCase()} -> Rings ${matches.join(", ")}`
    );
}

function placeBall(playerIndex){

    let held = players[playerIndex].holding;

    if(!held){
        alert("No ball held.");
        return;
    }

    let ringNum = prompt("Place into which ring? (1-5)");

    ringNum = parseInt(ringNum)-1;

    if(ringNum<0 || ringNum>4){
        return;
    }

    ringFilled[ringNum] = held;

    players[playerIndex].holding = null;

    renderAll();

    log(
        `Player ${playerIndex+1} placed ${held.toUpperCase()} into Ring ${ringNum+1}`
    );
}

function restockBaskets(){

    while(baskets.length<5){

        let needed = [];

        for(let i=0;i<5;i++){

            if(ringFilled[i]===null){
                needed.push(ringSolution[i]);
            }
        }

        if(needed.length===0){
            generateBasketPattern();
            break;
        }

        baskets.push(randomChoice(needed));
    }

    shuffle(baskets);

    renderAll();

    log("Baskets restocked.");
}

function resetAll(){

    ringSolution = [];
    ringFilled = [null,null,null,null,null];
    baskets = [];
    players = [];

    renderAll();

    document.getElementById("log").innerHTML = "";

    log("Reset everything.");
}

generatePuzzle();

</script>

</body>
</html>
