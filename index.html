<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Puzzle Simulator</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
    overflow:hidden;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:4px;
}

.controls{
    position:absolute;
    top:15px;
    left:15px;
    z-index:1000;
    background:#1c1c1c;
    padding:12px;
    border-radius:12px;
    border:1px solid #333;
    min-width:220px;
}

.version{
    color:#00ff88;
    font-weight:bold;
    margin-bottom:10px;
}

.log-panel{
    position:absolute;
    left:15px;
    top:220px;
    width:320px;
    background:#1c1c1c;
    border-radius:12px;
    border:1px solid #333;
    padding:12px;
    z-index:1000;
}

.log{
    background:black;
    border-radius:10px;
    padding:10px;
    max-height:500px;
    overflow:auto;
    font-family:monospace;
}

.game-area{
    position:relative;
    width:100vw;
    height:100vh;
}

.large-ring{
    position:absolute;
    width:90px;
    height:90px;
    border:5px solid gold;
    border-radius:50%;
    background:#222;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:12px;
    font-weight:bold;
    cursor:pointer;
    transition:box-shadow 0.15s;
}

.large-ring.drag-over{
    box-shadow:0 0 20px 6px gold;
}

.ring{
    position:absolute;
    width:95px;
    height:95px;
    border:6px solid #777;
    border-radius:50%;
    background:#222;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    transition:0.2s;
}

.basket{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:16px;
    border:3px solid white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
    position:absolute;
}

.white{
    background:white;
    color:black;
}

.red{
    background:#ff5050;
    color:white;
}

.blue{
    background:#4d7dff;
    color:white;
}

.player-panel{
    position:absolute;
    right:15px;
    top:15px;
    width:320px;
    max-height:92vh;
    overflow:auto;
    background:#1c1c1c;
    border-radius:12px;
    border:1px solid #333;
    padding:12px;
    z-index:1000;
}

.player{
    background:#2a2a2a;
    border:2px solid #444;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    cursor:pointer;
}

.selected{
    border:3px solid yellow;
}

.player.drag-over{
    border:3px solid #00ff88;
    background:#1a3a2a;
}

.ball{
    width:42px;
    height:28px;
    border-radius:50%;
    border:2px solid black;
    margin-top:8px;
    cursor:grab;
}

.ring-label{
    font-size:13px;
    font-weight:bold;
}

.player-stats{
    font-size:13px;
    margin-top:8px;
    opacity:0.8;
}

.disabled-x{
    position:absolute;
    font-size:80px;
    color:red;
    font-weight:bold;
    pointer-events:none;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-shadow:0 0 12px black;
}

</style>
</head>
<body>

<div class="controls">

    <div class="version">
        Version 2.0
    </div>

    <button onclick="generatePuzzle()">Elapse DPS Phase</button>
    <button onclick="alignBaskets()">Align</button>
    <button onclick="restockBaskets()">Kill Hydra</button>
    <button onclick="resetEverything()">Reset</button>

</div>

<div class="log-panel">

    <h2>Log</h2>

    <div class="log" id="log"></div>

</div>

<div class="player-panel">

    <h2>Players</h2>

    <div id="players"></div>

</div>

<div class="game-area">

    <div class="large-ring" id="large-ring">
        Run through<br>Middle
    </div>

    <div id="rings"></div>

    <div id="baskets"></div>

</div>

<script>

const COLORS = ["white","red","blue"];

// Positions arranged clockwise from top: top, mid-right, bottom-right, bottom-left, top-left
const POSITION_NAMES = [
    "3",   // top
    "4",   // mid-right
    "5",   // bot-right  (was "T")
    "1",   // bot-left
    "2"    // top-left
];

let disabledBasket = -1;

let isAligned = false;

let currentPlayer = 0;

let players = [];

let ringSolution = [];
let ringFilled = [null,null,null,null,null];
let ringRevealed = [false,false,false,false,false];

let baskets = [];

function log(msg){

    const div = document.getElementById("log");

    div.innerHTML = msg + "<br>" + div.innerHTML;
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];
    }
}

function generatePuzzle(){

    disabledBasket = -1;

    isAligned = false;

    // reset rings — new random solution, all unrevealed, no balls placed
    ringFilled = [null,null,null,null,null];

    ringRevealed = [false,false,false,false,false];

    let colors = [...COLORS];

    shuffle(colors);

    ringSolution = [
        colors[0],
        colors[0],
        colors[1],
        colors[1],
        colors[2]
    ];

    shuffle(ringSolution);

    // reroll basket colors with a fresh 3/2 split, preserve hasBall state
    let prevHasBall = baskets.map(b => b.hasBall);

    generateBasketPattern();

    baskets.forEach((b, i) => {

        b.hasBall = prevHasBall[i] !== undefined ? prevHasBall[i] : true;
    });

    // preserve players — do NOT reset holding or grabs

    renderAll();

    log("Elapsed DPS Phase.");
}

function generateBasketPattern(){

    let colors = [...COLORS];

    shuffle(colors);

    let pattern = [
        colors[0],
        colors[0],
        colors[0],
        colors[1],
        colors[1]
    ];

    shuffle(pattern);

    baskets = [];

    pattern.forEach(color=>{

        baskets.push({
            color:color,
            hasBall:true
        });
    });
}

function renderAll(){

    renderPlayers();

    renderRings();

    renderBaskets();
}

function renderPlayers(){

    const div = document.getElementById("players");

    div.innerHTML = "";

    players.forEach((p,index)=>{

        const playerDiv = document.createElement("div");

        playerDiv.className = "player";

        if(index===currentPlayer){

            playerDiv.classList.add("selected");
        }

        playerDiv.addEventListener("click", ()=>{

            currentPlayer = index;

            renderPlayers();
        });

        playerDiv.addEventListener("dragover", (e)=>{

            e.preventDefault();

            playerDiv.classList.add("drag-over");
        });

        playerDiv.addEventListener("dragleave", ()=>{

            playerDiv.classList.remove("drag-over");
        });

        playerDiv.addEventListener("drop", (e)=>{

            e.preventDefault();

            playerDiv.classList.remove("drag-over");

            const basketIndex = parseInt(e.dataTransfer.getData("basket"));

            if(isNaN(basketIndex)) return;

            grabBallForPlayer(basketIndex, index);
        });

        playerDiv.innerHTML = `
            <strong>
                Player ${index+1}${index < 3 ? ' <span style="color:gold;font-size:12px;">(Plate)</span>' : ''}
            </strong>

            ${
                p.holding
                ? `<div 
                    class="ball ${p.holding}"
                    draggable="true"
                    ondragstart="dragBall(event,${index})"
                ></div>`
                : `<div style="margin-top:10px;">Holding: Nothing</div>`
            }

            <div class="player-stats">
                Total Grabs: <span style="font-weight:bold; color:${p.grabs < Math.max(...players.map(p=>p.grabs)) ? '#ff5050' : '#00ff88'}; font-size:15px;">${p.grabs}</span>
            </div>
        `;

        div.appendChild(playerDiv);
    });
}

function renderRings(){

    const div = document.getElementById("rings");

    div.innerHTML = "";

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const radius = 170;

    for(let i=0;i<5;i++){

        const angle = (-90 + i*72) * Math.PI/180;

        const x = centerX + radius*Math.cos(angle);
        const y = centerY + radius*Math.sin(angle);

        const ring = document.createElement("div");

        ring.className = "ring";

        if(ringRevealed[i]){

            ring.classList.add(ringSolution[i]);
        }

        ring.style.left = `${x-47}px`;
        ring.style.top = `${y-47}px`;

        ring.ondragover = (e)=>e.preventDefault();

        ring.ondrop = (e)=>dropBall(e,i);

        ring.innerHTML = `
            <div class="ring-label">
                ${POSITION_NAMES[i]}
            </div>

            ${
                ringFilled[i]
                ? `<div class="ball ${ringFilled[i]}"></div>`
                : ""
            }

            ${
                i === disabledBasket
                ? `<div class="disabled-x">X</div>`
                : ``
            }
        `;

        div.appendChild(ring);
    }
}

function renderBaskets(){

    const div = document.getElementById("baskets");

    div.innerHTML = "";

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const radius = 410;

    baskets.forEach((basket,index)=>{

        const angle = (-90 + index*72) * Math.PI/180;

        const x = centerX + radius*Math.cos(angle);
        const y = centerY + radius*Math.sin(angle);

        const basketDiv = document.createElement("div");

        basketDiv.className = `basket ${basket.color}`;

        basketDiv.style.left = `${x-60}px`;
        basketDiv.style.top = `${y-60}px`;

        basketDiv.innerHTML = `
            <strong>
                ${POSITION_NAMES[index]}
            </strong>

            <br>

            ${
                basket.hasBall
                ? `<div class="ball ${basket.color}"
                    draggable="true"
                    ondragstart="dragBasketBall(event,${index})"
                  ></div>`
                : `<div style="margin-top:8px;">Empty</div>`
            }
        `;

        div.appendChild(basketDiv);
    });
}

function dragBasketBall(event, basketIndex){

    event.dataTransfer.setData("basket", basketIndex);
}

function canPlayerGrab(playerIndex){

    const playerGrabs = players[playerIndex].grabs;

    let minimum = Math.min(...players.map(p => p.grabs));

    return playerGrabs <= minimum;
}

function grabBallForPlayer(basketIndex, playerIndex){

    let basket = baskets[basketIndex];

    if(!basket.hasBall){

        alert("No ball in basket.");

        return;
    }

    if(!canPlayerGrab(playerIndex)){

        alert("You can't do that yet. Every player must grab before anyone grabs again.");

        return;
    }

    if(players[playerIndex].holding){

        alert("Player is already holding a ball.");

        return;
    }

    players[playerIndex].holding = basket.color;

    players[playerIndex].grabs++;

    basket.hasBall = false;

    renderAll();

    log(
        `Player ${playerIndex+1} grabbed ${basket.color.toUpperCase()} from ${POSITION_NAMES[basketIndex]}`
    );
}

function autoRevealRemainingColor(){

    let revealedColors = [];

    for(let i=0;i<5;i++){

        if(ringRevealed[i]){

            revealedColors.push(ringSolution[i]);
        }
    }

    revealedColors = [...new Set(revealedColors)];

    if(revealedColors.length !== 2){

        return;
    }

    const missing = COLORS.find(c => !revealedColors.includes(c));

    for(let i=0;i<5;i++){

        if(ringSolution[i] === missing){

            ringRevealed[i] = true;
        }
    }

    log(
        `Automatically revealed ${missing.toUpperCase()}`
    );
}

function checkRingColors(playerIndex){

    let held = players[playerIndex].holding;

    if(!held){

        alert("Player not holding a ball.");

        return;
    }

    players[playerIndex].holding = null;

    for(let i=0;i<5;i++){

        if(ringSolution[i]===held){

            ringRevealed[i] = true;
        }
    }

    autoRevealRemainingColor();

    let currentColors = baskets.map(b => b.color);

    let remainingColors = COLORS.filter(c => c !== held);

    let keptColor = remainingColors.find(c => currentColors.includes(c));

    let newColor = remainingColors.find(c => !currentColors.includes(c));

    let newPattern = currentColors.map(color => {

        if(color === held){

            return newColor;
        }

        return color;
    });

    shuffle(newPattern);

    baskets.forEach((basket,index)=>{

        basket.color = newPattern[index];
    });

    renderAll();

    log(
        `Player ${playerIndex+1} checked ${held.toUpperCase()}`
    );
}

function alignBaskets(){

    let newPattern = [...ringSolution];

    shuffle(newPattern);

    baskets.forEach((basket,index)=>{

        basket.color = newPattern[index];

        // do NOT restock — baskets keep their current hasBall state
    });

    // clear only the balls placed in rings, but keep colors revealed
    ringFilled = [null,null,null,null,null];

    // disabled position is one of the 5 inner rings (not the outer baskets)
    disabledBasket = Math.floor(Math.random()*5);

    isAligned = true;

    renderAll();

    log(
        `Aligned baskets and disabled inner ring ${POSITION_NAMES[disabledBasket]}`
    );
}

function dragBall(event,playerIndex){

    event.dataTransfer.setData("player",playerIndex);
}

function dropBall(event,ringIndex){

    const playerIndex = parseInt(
        event.dataTransfer.getData("player")
    );

    const held = players[playerIndex].holding;

    if(!held){

        return;
    }

    if(ringIndex === disabledBasket){

        alert("This ring is disabled.");

        return;
    }

    if(isAligned && playerIndex < 3){

        alert("Plate players cannot place balls into rings during alignment.");

        return;
    }

    if(!ringRevealed[ringIndex]){

        alert("Ring color has not been revealed yet.");

        return;
    }

    if(ringSolution[ringIndex]!==held){

        alert("Wrong color.");

        return;
    }

    ringFilled[ringIndex] = held;

    players[playerIndex].holding = null;

    renderAll();

    log(
        `Player ${playerIndex+1} placed ${held.toUpperCase()} into ${POSITION_NAMES[ringIndex]}`
    );
}

function restockBaskets(){

    baskets.forEach(b=>{

        b.hasBall = true;
    });

    renderAll();

    log("Killed Hydra.");
}

function resetEverything(){

    document.getElementById("log").innerHTML = "";

    disabledBasket = -1;

    isAligned = false;

    ringFilled = [null,null,null,null,null];

    ringRevealed = [false,false,false,false,false];

    let colors = [...COLORS];

    shuffle(colors);

    ringSolution = [
        colors[0],
        colors[0],
        colors[1],
        colors[1],
        colors[2]
    ];

    shuffle(ringSolution);

    generateBasketPattern();

    players = [];

    for(let i=0;i<6;i++){

        players.push({
            holding:null,
            grabs:0
        });
    }

    renderAll();
}

resetEverything();

window.addEventListener("resize", renderAll);

// Wire drag-drop onto the center large-ring
const largeRing = document.getElementById("large-ring");

largeRing.addEventListener("dragover", (e)=>{

    e.preventDefault();

    largeRing.classList.add("drag-over");
});

largeRing.addEventListener("dragleave", ()=>{

    largeRing.classList.remove("drag-over");
});

largeRing.addEventListener("drop", (e)=>{

    e.preventDefault();

    largeRing.classList.remove("drag-over");

    const playerIndex = parseInt(e.dataTransfer.getData("player"));

    if(isNaN(playerIndex)) return;

    checkRingColors(playerIndex);
});

</script>

</body>
</html>
