<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Puzzle Simulator</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
    overflow:hidden;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:4px;
}

.controls{
    position:absolute;
    top:15px;
    left:15px;
    z-index:1000;
    background:#1c1c1c;
    padding:12px;
    border-radius:12px;
    border:1px solid #333;
    min-width:220px;
}

.version{
    color:#00ff88;
    font-weight:bold;
    margin-bottom:10px;
}

.game-area{
    position:relative;
    width:100vw;
    height:100vh;
}

.large-ring{
    position:absolute;
    width:170px;
    height:170px;
    border:8px solid gold;
    border-radius:50%;
    background:#222;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.ring{
    position:absolute;
    width:95px;
    height:95px;
    border:6px solid #777;
    border-radius:50%;
    background:#222;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    transition:0.2s;
}

.basket{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:16px;
    border:3px solid white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
}

.white{
    background:white;
    color:black;
}

.red{
    background:#ff5050;
    color:white;
}

.blue{
    background:#4d7dff;
    color:white;
}

.player-panel{
    position:absolute;
    right:15px;
    top:15px;
    width:320px;
    max-height:92vh;
    overflow:auto;
    background:#1c1c1c;
    border-radius:12px;
    border:1px solid #333;
    padding:12px;
    z-index:1000;
}

.player{
    background:#2a2a2a;
    border:2px solid #444;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    cursor:pointer;
}

.selected{
    border:3px solid yellow;
}

.ball{
    width:42px;
    height:28px;
    border-radius:50%;
    border:2px solid black;
    margin-top:8px;
    cursor:grab;
}

.log{
    margin-top:20px;
    background:black;
    border-radius:10px;
    padding:10px;
    max-height:220px;
    overflow:auto;
    font-family:monospace;
}

.ring-label{
    font-size:13px;
    font-weight:bold;
}

.player-stats{
    font-size:13px;
    margin-top:8px;
    opacity:0.8;
}

</style>
</head>
<body>

<div class="controls">

    <div class="version">
        Version 1.3
    </div>

    <button onclick="generatePuzzle()">Generate Puzzle</button>
    <button onclick="restockBaskets()">Restock Baskets</button>
    <button onclick="resetEverything()">Reset</button>

</div>

<div class="player-panel">

    <h2>Players</h2>

    <div id="players"></div>

    <h2>Log</h2>

    <div class="log" id="log"></div>

</div>

<div class="game-area">

    <div class="large-ring">
        Check<br>Ring Colors
    </div>

    <div id="rings"></div>

    <div id="baskets"></div>

</div>

<script>

const COLORS = ["white","red","blue"];

let currentPlayer = 0;

let players = [];

let ringSolution = [];
let ringFilled = [null,null,null,null,null];
let ringRevealed = [false,false,false,false,false];

let baskets = [];

function log(msg){

    const div = document.getElementById("log");

    div.innerHTML = msg + "<br>" + div.innerHTML;
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];
    }
}

function generatePuzzle(){

    ringFilled = [null,null,null,null,null];

    ringRevealed = [false,false,false,false,false];

    let colors = [...COLORS];

    shuffle(colors);

    ringSolution = [
        colors[0],
        colors[0],
        colors[1],
        colors[1],
        colors[2]
    ];

    shuffle(ringSolution);

    generateBasketPattern();

    players = [];

    for(let i=0;i<6;i++){

        players.push({
            holding:null,
            grabs:0
        });
    }

    renderAll();

    log("Generated puzzle.");
}

function generateBasketPattern(){

    let colors = [...COLORS];

    shuffle(colors);

    let pattern = [
        colors[0],
        colors[0],
        colors[0],
        colors[1],
        colors[1]
    ];

    shuffle(pattern);

    baskets = [];

    pattern.forEach(color=>{

        baskets.push({
            color:color,
            hasBall:true
        });
    });
}

function renderAll(){

    renderPlayers();

    renderRings();

    renderBaskets();
}

function renderPlayers(){

    const div = document.getElementById("players");

    div.innerHTML = "";

    players.forEach((p,index)=>{

        const playerDiv = document.createElement("div");

        playerDiv.className = "player";

        if(index===currentPlayer){

            playerDiv.classList.add("selected");
        }

        playerDiv.addEventListener("click", ()=>{

            currentPlayer = index;

            renderPlayers();
        });

        playerDiv.innerHTML = `
            <strong>
                Player ${index+1}
            </strong>

            ${
                p.holding
                ? `<div 
                    class="ball ${p.holding}"
                    draggable="true"
                    ondragstart="dragBall(event,${index})"
                ></div>`
                : `<div style="margin-top:10px;">Holding: Nothing</div>`
            }

            <div class="player-stats">
                Total Grabs: ${p.grabs}
            </div>

            <br>

            <button class="check-btn">
                Check Ring Colors
            </button>
        `;

        const btn = playerDiv.querySelector(".check-btn");

        btn.addEventListener("click",(e)=>{

            e.stopPropagation();

            checkRingColors(index);
        });

        div.appendChild(playerDiv);
    });
}

function renderRings(){

    const div = document.getElementById("rings");

    div.innerHTML = "";

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const radius = 170;

    for(let i=0;i<5;i++){

        const angle = (-90 + i*72) * Math.PI/180;

        const x = centerX + radius*Math.cos(angle);
        const y = centerY + radius*Math.sin(angle);

        const ring = document.createElement("div");

        ring.className = "ring";

        if(ringRevealed[i]){

            ring.classList.add(ringSolution[i]);
        }

        ring.style.left = `${x-47}px`;
        ring.style.top = `${y-47}px`;

        ring.ondragover = (e)=>e.preventDefault();

        ring.ondrop = (e)=>dropBall(e,i);

        ring.innerHTML = `
            <div class="ring-label">
                Ring ${i+1}
            </div>

            ${
                ringFilled[i]
                ? `<div class="ball ${ringFilled[i]}"></div>`
                : ""
            }
        `;

        div.appendChild(ring);
    }
}

function renderBaskets(){

    const div = document.getElementById("baskets");

    div.innerHTML = "";

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const radius = 410;

    baskets.forEach((basket,index)=>{

        const angle = (-90 + index*72) * Math.PI/180;

        const x = centerX + radius*Math.cos(angle);
        const y = centerY + radius*Math.sin(angle);

        const basketDiv = document.createElement("div");

        basketDiv.className = `basket ${basket.color}`;

        basketDiv.style.left = `${x-60}px`;
        basketDiv.style.top = `${y-60}px`;

        basketDiv.innerHTML = `
            <strong>
                Basket ${index+1}
            </strong>

            <br>

            ${
                basket.hasBall
                ? `<div class="ball ${basket.color}"></div>`
                : `<div style="margin-top:8px;">Empty</div>`
            }
        `;

        basketDiv.addEventListener("click", ()=>{

            grabBall(index);
        });

        div.appendChild(basketDiv);
    });
}

function canPlayerGrab(playerIndex){

    const playerGrabs = players[playerIndex].grabs;

    let minimum = Math.min(...players.map(p => p.grabs));

    return playerGrabs <= minimum;
}

function grabBall(index){

    let basket = baskets[index];

    if(!basket.hasBall){

        alert("No ball in basket.");

        return;
    }

    if(!canPlayerGrab(currentPlayer)){

        alert("You can't do that yet. Every player must grab before anyone grabs again.");

        return;
    }

    players[currentPlayer].holding = basket.color;

    players[currentPlayer].grabs++;

    basket.hasBall = false;

    renderAll();

    log(
        `Player ${currentPlayer+1} grabbed ${basket.color.toUpperCase()}`
    );
}

function autoRevealRemainingColor(){

    let revealedColors = [];

    for(let i=0;i<5;i++){

        if(ringRevealed[i]){

            revealedColors.push(ringSolution[i]);
        }
    }

    revealedColors = [...new Set(revealedColors)];

    if(revealedColors.length !== 2){

        return;
    }

    const missing = COLORS.find(c => !revealedColors.includes(c));

    for(let i=0;i<5;i++){

        if(ringSolution[i] === missing){

            ringRevealed[i] = true;
        }
    }

    log(
        `Automatically revealed ${missing.toUpperCase()} via process of elimination`
    );
}

function checkRingColors(playerIndex){

    let held = players[playerIndex].holding;

    if(!held){

        alert("Player not holding a ball.");

        return;
    }

    players[playerIndex].holding = null;

    for(let i=0;i<5;i++){

        if(ringSolution[i]===held){

            ringRevealed[i] = true;
        }
    }

    autoRevealRemainingColor();

    let colorCounts = {};

    COLORS.forEach(c => colorCounts[c] = 0);

    baskets.forEach(b => {

        colorCounts[b.color]++;
    });

    let remainingColors = COLORS.filter(c => c !== held);

    let keptColor = remainingColors.find(c => colorCounts[c] > 0);

    let missingColor = remainingColors.find(c => colorCounts[c] === 0);

    let keptCount = colorCounts[keptColor];
    let removedCount = colorCounts[held];

    let newPattern = [];

    for(let i=0;i<keptCount;i++){

        newPattern.push(keptColor);
    }

    for(let i=0;i<removedCount;i++){

        newPattern.push(missingColor);
    }

    shuffle(newPattern);

    baskets = [];

    for(let i=0;i<5;i++){

        baskets.push({
            color:newPattern[i],
            hasBall:i<4
        });
    }

    renderAll();

    log(
        `Player ${playerIndex+1} checked ${held.toUpperCase()}`
    );
}

function dragBall(event,playerIndex){

    event.dataTransfer.setData("player",playerIndex);
}

function dropBall(event,ringIndex){

    const playerIndex = parseInt(
        event.dataTransfer.getData("player")
    );

    const held = players[playerIndex].holding;

    if(!held){

        return;
    }

    if(!ringRevealed[ringIndex]){

        alert("Ring color has not been revealed yet.");

        return;
    }

    if(ringSolution[ringIndex]!==held){

        alert("Wrong color.");

        return;
    }

    ringFilled[ringIndex] = held;

    players[playerIndex].holding = null;

    renderAll();

    log(
        `Player ${playerIndex+1} placed ${held.toUpperCase()} into Ring ${ringIndex+1}`
    );
}

function restockBaskets(){

    baskets.forEach(b=>{

        b.hasBall = true;
    });

    renderAll();

    log("Restocked baskets.");
}

function resetEverything(){

    document.getElementById("log").innerHTML = "";

    generatePuzzle();
}

generatePuzzle();

window.addEventListener("resize", renderAll);

</script>

</body>
</html>
